<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Meridian, reform-turnaround macro screen">
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#062030"/>
      <stop offset="55%" stop-color="#041019"/>
      <stop offset="100%" stop-color="#030b12"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="-20%" r="80%">
      <stop offset="0%" stop-color="#55c6dd" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#55c6dd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a713b"/>
      <stop offset="50%" stop-color="#e8c877"/>
      <stop offset="100%" stop-color="#8a713b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#sea)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- faint score-history line, rising out of the depths -->
  <polyline points="60,240 160,235 260,246 360,238 460,242 560,220 660,225 760,196 860,201 960,170 1060,150 1140,142"
    fill="none" stroke="#55c6dd" stroke-opacity="0.35" stroke-width="2"/>
  <circle cx="1140" cy="142" r="5" fill="#35d6a5"/>

  <!-- trident -->
  <g transform="translate(120,88)" stroke="#e8c877" stroke-width="7" stroke-linecap="round" fill="none">
    <path d="M0 -34 V96"/>
    <path d="M-30 -30 V-6 Q-30 16 0 18 Q30 16 30 -6 V-30"/>
    <path d="M-8 96 H8"/>
  </g>

  <text x="210" y="140" font-family="Iowan Old Style, Palatino, Georgia, serif" font-size="64"
    letter-spacing="18" fill="#e8c877">MERIDIAN</text>
  <text x="214" y="180" font-family="SF Mono, Menlo, Consolas, monospace" font-size="17"
    letter-spacing="6" fill="#93b2b6">REFORM-TURNAROUND MACRO SCREEN</text>
  <text x="214" y="212" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13"
    letter-spacing="2" fill="#5f8089">197 countries · 5 factors · curated overlays with sources · an honest backtest</text>

  <!-- meander wave strip -->
  <path d="M0 278 Q15 266 30 274 T60 278 T90 278 T120 278 T150 278 T180 278 T210 278 T240 278 T270 278 T300 278 T330 278 T360 278 T390 278 T420 278 T450 278 T480 278 T510 278 T540 278 T570 278 T600 278 T630 278 T660 278 T690 278 T720 278 T750 278 T780 278 T810 278 T840 278 T870 278 T900 278 T930 278 T960 278 T990 278 T1020 278 T1050 278 T1080 278 T1110 278 T1140 278 T1170 278 T1200 278"
    fill="none" stroke="#d4af5f" stroke-opacity="0.4" stroke-width="1.5"/>
</svg>
